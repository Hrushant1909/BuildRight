version: 0.2

env:
  variables:
    S3_BUCKET: buildright-frontend   

phases:
  install:
    runtime-versions:
      nodejs: 20

  pre_build:
    commands:
      - cd frontend
      - npm install

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - echo "Deploying to S3..."
      - aws s3 sync dist/ s3://$S3_BUCKET --delete

artifacts:
  base-directory: frontend/dist
  files:
    - '**/*'