version: 0.2

env:
  variables:
    ARTIFACT_BUCKET: buildright-artifacts

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing Maven...
      - yum install -y maven

  pre_build:
    commands:
      - cd backend
      - mvn clean

  build:
    commands:
      - mvn package -DskipTests

  post_build:
    commands:
      - mkdir deploy
      - cp target/*.jar deploy/app.jar
      - cp ../cicd/appspec.yml deploy/
      - cp -r scripts deploy/
      - cd deploy
      - zip -r app.zip .
      - aws s3 cp app.zip s3://$ARTIFACT_BUCKET/app.zip

artifacts:
  files:
    - backend/target/*.jar