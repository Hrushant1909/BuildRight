spring.application.name=Buildright
server.port=8080
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (HS256) — secret must be >= 256 bits for Keys.hmacShaKeyFor
jwt.secret=BuildRightJWTSecretKeyMustBeAtLeast256BitsLongForHS256SigningAlgorithm2026BuildRight
jwt.expiration-ms=86400000

# AWS S3 Configuration
AWS_REGION=ap-south-1
AWS_BUCKET_NAME=buildright-1

